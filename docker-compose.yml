version: "3.9"

# Single-container VoiceAgent
#
# Usage:
#   docker compose up --build
#   open http://localhost:8080
#
# FastAPI serves both the transcription API (/api/*) and the React SPA —
# no nginx or supervisord required.
# Models baked in at build time: medium · large-v2 · large-v3

services:
  voiceagent:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "8080:8080"
    volumes:
      # Persist the HuggingFace cache so models survive container restarts.
      - whisper_cache:/root/.cache/huggingface
    environment:
      PORT: "8080"
      STATIC_DIR: "/app/static"
      # Controls which model is pre-loaded at startup (fast first request).
      # Must be one of: medium | large-v2 | large-v3
      WHISPER_MODEL: medium
      HF_HUB_DISABLE_SYMLINKS_WARNING: "1"
    restart: unless-stopped
    healthcheck:
      # Use Python (always available) instead of curl
      test: ["CMD", "python", "-c",
             "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

volumes:
  whisper_cache:
