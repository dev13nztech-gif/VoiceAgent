# nginx config — single-container VoiceAgent
#
# $PORT is substituted by docker-entrypoint.sh at startup via envsubst.
# uvicorn (FastAPI) runs on the loopback interface at port 8001.

server {
    listen ${PORT};

    # ── React SPA ────────────────────────────────────────────────────────────
    root  /app/static;
    index index.html;

    # All unknown paths fall back to index.html (client-side routing).
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── FastAPI backend ───────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Transcription of long audio files can take several minutes on CPU.
        proxy_read_timeout    900s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    900s;

        # Allow large uploads (up to 500 MB).
        client_max_body_size 500M;
    }

    # Convenience alias: /health -> /api/health (Cloud Run readiness probe).
    location = /health {
        proxy_pass http://127.0.0.1:8001/api/health;
    }

    # Silence noisy logs for browser auto-requests.
    location = /favicon.ico { access_log off; log_not_found off; }
    location = /robots.txt  { access_log off; log_not_found off; }
}
