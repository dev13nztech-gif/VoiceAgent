# nginx config for Cloud Run (single-container deployment).
# $PORT is substituted at container startup via envsubst.
# uvicorn runs internally on 127.0.0.1:8001.

server {
    listen ${PORT};

    # ── Frontend (React SPA) ─────────────────────────────────────────────────
    root /app/static;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Backend API (proxy to uvicorn) ───────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8001/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Transcription of long audio can take several minutes on CPU.
        # Cloud Run service timeout must be set >= this value (max 3600s).
        proxy_read_timeout    900s;
        proxy_connect_timeout 10s;
        proxy_send_timeout    900s;

        # Allow large audio file uploads (500 MB).
        client_max_body_size 500M;
    }

    # ── Health check endpoint ────────────────────────────────────────────────
    location /health {
        proxy_pass http://127.0.0.1:8001/api/health;
    }

    location = /favicon.ico { access_log off; log_not_found off; }
}
